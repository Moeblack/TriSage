<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriSage — Test Console</title>
    <style>
        :root {
            --bg-color: #0f0f17;
            --bg-glass: rgba(15, 15, 23, 0.8);
            --card-bg: #1a1a2e;
            --border-color: #2a2a4a;
            --accent-color: #7c3aed;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --keep-color: #22c55e;
            --revise-color: #f59e0b;
            --error-color: #ef4444;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            background-color: var(--bg-glass);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1.5rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .config-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .config-toggle:hover {
            background-color: var(--border-color);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }

        .tab-content.active {
            display: flex;
        }

        /* Panels */
        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.25rem;
        }

        /* Config Panel */
        #config-panel {
            display: none;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        #config-panel.open {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, textarea {
            background-color: #0a0a14;
            border: 1px solid var(--border-color);
            border-radius: 0.4rem;
            padding: 0.6rem 0.8rem;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.9375rem;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            min-height: 100px;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            height: 48px;
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Process View */
        #process-view {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .op-card {
            border-left: 4px solid var(--accent-color);
            padding: 0;
            overflow: hidden;
            transition: all 0.3s;
        }

        .op-header {
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .op-title {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .op-status {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7);
            animation: pulse 2s infinite;
        }

        .pulse-purple {
            background-color: #a855f7;
            box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.7);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(124, 58, 237, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
        }

        .op-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .subround-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-left: 1rem;
            border-left: 2px solid var(--border-color);
        }

        .subround-title {
            font-weight: 600;
            font-size: 0.9375rem;
            color: var(--text-muted);
        }

        .agent-responses-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .agent-card {
            flex: 1;
            min-width: 280px;
            background-color: #111122;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
        }

        .agent-card-header {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8125rem;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
        }

        .agent-card-body {
            padding: 0.8rem;
            font-size: 0.875rem;
            flex: 1;
            position: relative;
        }

        .content-preview {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-wrap;
        }

        .content-full {
            display: none;
            white-space: pre-wrap;
        }

        .expand-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.4rem 0;
            display: block;
            margin-top: 0.5rem;
        }

        .votes-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .vote-item {
            padding: 0.75rem;
            background-color: #111122;
            border-radius: 0.4rem;
            font-size: 0.875rem;
            border: 1px solid transparent;
        }

        .vote-keep { border-color: rgba(34, 197, 94, 0.2); }
        .vote-revise { border-color: rgba(245, 158, 11, 0.2); }
        .vote-accept { border-color: rgba(34, 197, 94, 0.2); }
        .vote-redo { border-color: rgba(239, 68, 68, 0.2); }

        .vote-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 0.25rem;
            font-weight: 700;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            text-transform: uppercase;
        }

        .badge-keep, .badge-accept { background-color: var(--keep-color); color: #fff; }
        .badge-revise { background-color: var(--revise-color); color: #fff; }
        .badge-redo { background-color: var(--error-color); color: #fff; }

        .vote-reason {
            margin-top: 0.25rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .result-summary {
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 0.75rem;
            background-color: rgba(124, 58, 237, 0.1);
            border-radius: 0.4rem;
            align-self: flex-start;
        }

        /* Monitor Specific Styles */
        #monitor-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .monitor-card {
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            background-color: var(--card-bg);
            overflow: hidden;
        }

        .monitor-card-header {
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .monitor-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .monitor-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .monitor-id { font-family: monospace; color: var(--accent-color); font-weight: bold; }

        .monitor-status-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .monitor-sections {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .monitor-section {
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
     overflow: hidden;
        }

        .monitor-section-header {
            background-color: rgba(255, 255, 255, 0.02);
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .monitor-section-body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .monitor-section.collapsed .monitor-section-body { display: none; }

        /* Message Bubbles */
        .message-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .msg-bubble {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            max-width: 90%;
            font-size: 0.875rem;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .msg-system { background-color: #334155; border-bottom-left-radius: 0; align-self: flex-start; color: #cbd5e1; border: 1px solid #475569; }
        .msg-user { background-color: #1e3a8a; border-bottom-right-radius: 0; align-self: flex-end; color: #dbeafe; border: 1px solid #1e40af; }
        .msg-assistant { background-color: #064e3b; border-bottom-left-radius: 0; align-self: flex-start; color: #dcfce7; border: 1px solid #065f46; }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        /* Final Response */
        #final-response-container {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        #final-response-container.visible {
            display: flex;
        }

        .final-response-text {
            white-space: pre-wrap;
            font-size: 1rem;
        }

        /* Footer */
        footer {
            padding: 0.75rem 2rem;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        .timer {
            font-family: monospace;
            font-size: 1rem;
            color: var(--text-color);
        }

        .clear-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.25rem 0.5rem;
            border-radius: 0.3rem;
            cursor: pointer;
        }

        .clear-btn:hover {
            color: var(--text-color);
            border-color: var(--text-muted);
        }

        /* Collapsible helpers */
        .hidden { display: none !important; }
        .collapsed .op-body { display: none; }
        .collapsed .op-header::after { content: '▶'; }
        .op-header::after { content: '▼'; font-size: 0.75rem; color: var(--text-muted); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }

        .stream-content {
            position: relative;
        }

        .stream-content::after {
            content: '▊';
            animation: blink 1s step-start infinite;
            color: var(--accent-color);
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .stream-content.done::after {
            display: none;
        }

    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>🧠 TriSage</h1>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="console">Console</button>
                <button class="tab-btn" data-tab="monitor">API Monitor</button>
            </nav>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button class="clear-btn" id="clear-btn">Clear View</button>
            <button class="config-toggle" id="config-toggle">Config</button>
        </div>
    </header>

    <main id="main-scroll">
        <div id="console-tab" class="tab-content active">
            <div class="panel" id="config-panel">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>API Endpoint</label>
                        <input type="text" id="endpoint-input" value="http://localhost:3000">
                    </div>
                    <div class="form-group">
                        <label>Model ID</label>
                        <input type="text" id="model-input" value="trisage">
                    </div>
                </div>
                <div class="form-group">
                    <label>System Prompt (Override)</label>
                    <textarea id="system-prompt-input" placeholder="Enter system instructions..."></textarea>
                </div>
            </div>

            <div class="panel">
                <div class="input-area">
                    <div class="form-group" style="flex: 1;">
                        <label>User Message</label>
                        <textarea id="user-input" placeholder="Type your complex prompt here..."></textarea>
                    </div>
                    <button class="send-btn" id="send-btn">
                        <span>🚀 Send</span>
                    </button>
                </div>
            </div>

            <div id="process-view">
                <!-- Dynamic events will be injected here -->
            </div>

            <div class="panel" id="final-response-container">
                <div class="op-title">Final Synthesized Response</div>
                <div class="final-response-text" id="final-response-text"></div>
            </div>
        </div>

        <div id="monitor-tab" class="tab-content">
            <div id="monitor-list">
                <!-- API Monitor cards will be injected here -->
            </div>
        </div>
    </main>

    <footer>
        <div id="status-text">Ready</div>
        <div class="timer" id="timer">00:00.0</div>
        <div id="rounds-info">Rounds: 0</div>
    </footer>

    <script>
        const elements = {
            configToggle: document.getElementById('config-toggle'),
            configPanel: document.getElementById('config-panel'),
            endpointInput: document.getElementById('endpoint-input'),
            modelInput: document.getElementById('model-input'),
            systemPromptInput: document.getElementById('system-prompt-input'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            clearBtn: document.getElementById('clear-btn'),
            processView: document.getElementById('process-view'),
            finalResponseContainer: document.getElementById('final-response-container'),
            finalResponseText: document.getElementById('final-response-text'),
            timer: document.getElementById('timer'),
            statusText: document.getElementById('status-text'),
            roundsInfo: document.getElementById('rounds-info'),
            mainScroll: document.getElementById('main-scroll'),
            monitorList: document.getElementById('monitor-list')
        };

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                
                // Update buttons
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Update content
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`${tabName}-tab`).classList.add('active');
            });
        });

        let startTime = 0;
        let timerInterval = null;
        let currentRounds = 1;

        // Console Scope
        const consoleScope = {
            id: 'console',
            processView: elements.processView,
            roundsInfo: elements.roundsInfo,
            finalResponseContainer: elements.finalResponseContainer,
            finalResponseText: elements.finalResponseText,
            mainScroll: elements.mainScroll,
            activeOpCard: null,
            activeSubroundSection: null
        };

        // Toggle Config
        elements.configToggle.addEventListener('click', () => {
            elements.configPanel.classList.toggle('open');
        });

        // Clear View
        elements.clearBtn.addEventListener('click', () => {
            elements.processView.innerHTML = '';
            elements.finalResponseContainer.classList.remove('visible');
            elements.finalResponseText.innerText = '';
            elements.statusText.innerText = 'Ready';
            elements.timer.innerText = '00:00.0';
            elements.roundsInfo.innerText = 'Rounds: 0';
        });

        // Send Message
        elements.sendBtn.addEventListener('click', async () => {
            const userMsg = elements.userInput.value.trim();
            if (!userMsg) return;

            const messages = [];
            if (elements.systemPromptInput.value.trim()) {
                messages.push({ role: 'system', content: elements.systemPromptInput.value.trim() });
            }
            messages.push({ role: 'user', content: userMsg });

            // Reset UI
            elements.processView.innerHTML = '';
            elements.finalResponseContainer.classList.remove('visible');
            elements.sendBtn.disabled = true;
            elements.statusText.innerHTML = '<span class="pulse"></span> Running';
            
            // Timer
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);

            try {
                await streamOrchestration(messages);
            } catch (error) {
                handleEvent({ type: 'orchestration:error', data: { error: error.message } }, consoleScope);
            } finally {
                elements.sendBtn.disabled = false;
                clearInterval(timerInterval);
                if (!elements.statusText.innerText.includes('Error')) {
                    elements.statusText.innerText = 'Complete';
                }
            }
        });

        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            const minutes = Math.floor(elapsed / 60);
            const seconds = (elapsed % 60).toFixed(1);
            elements.timer.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.padStart(4, '0')}`;
        }

        async function streamOrchestration(messages) {
            const endpoint = elements.endpointInput.value.trim();
            const model = elements.modelInput.value.trim();

            const response = await fetch(`${endpoint}/v1/chat/completions/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, messages }),
            });

            if (!response.ok) {
                const error = await response.text();
                throw new Error(error || 'Server error');
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    const cleanLine = line.trim();
                    if (!cleanLine || !cleanLine.startsWith('data: ')) continue;
                    
                    const dataStr = cleanLine.slice(6);
                    if (dataStr === '[DONE]') break;
                    
                    try {
                        const event = JSON.parse(dataStr);
                        handleEvent(event, consoleScope);
                    } catch (e) {
                        console.error('Parse error', e, dataStr);
                    }
                }
            }
        }

        // Event Handling
        function handleEvent(event, scope) {
            const { type, data, timestamp } = event;
            console.log(`[${scope.id}] Event: ${type}`, data);

            switch (type) {
                case 'orchestration:start':
                    if (scope.roundsInfo) scope.roundsInfo.innerText = 'Rounds: 1';
                    break;

                case 'operationA:start':
                    createOpCard(`Operation A — Debate (Round ${data.round})`, 'debate', scope);
                    if (scope.roundsInfo) scope.roundsInfo.innerText = `Rounds: ${data.round}`;
                    break;

                case 'operationA:phase1:start':
                    createSubroundSection(`Sub-round ${data.subRound} — Phase 1: Parallel Generation`, `phase1-${data.subRound}`, scope);
                    const row = document.createElement('div');
                    row.className = 'agent-responses-row';
                    row.id = `responses-row-${scope.id}-${data.subRound}`;
                    scope.activeSubroundSection.appendChild(row);
                    // Pre-create agent cards for streaming
                    if (data.agentIds) {
                        data.agentIds.forEach((id, idx) => {
                            createStreamingAgentCard(row, id, idx, scope);
                        });
                    }
                    break;

                case 'operationA:phase1:stream':
                    appendToAgentCard(data.agentId, data.token, scope);
                    break;

                case 'operationA:phase1:response':
                    finalizeAgentCard(data.agentId, data.fullResponse || data.responsePreview, scope);
                    break;

                case 'operationK:stream':
                    if (!scope.finalResponseContainer.classList.contains('visible')) {
                        scope.finalResponseContainer.classList.add('visible');
                        scope.finalResponseText.innerText = '';
                    }
                    scope.finalResponseText.innerText += data.token;
                    if (scope.mainScroll) scope.mainScroll.scrollTop = scope.mainScroll.scrollHeight;
                    break;

                case 'operationA:phase2:start':
                    createSubroundSection(`Sub-round ${data.subRound} — Phase 2: Cross-Review & Vote`, `phase2-${data.subRound}`, scope);
                    const votesList = document.createElement('div');
                    votesList.className = 'votes-list';
                    votesList.id = `votes-list-a-${scope.id}-${data.subRound}`;
                    scope.activeSubroundSection.appendChild(votesList);
                    break;

                case 'operationA:phase2:vote':
                    const alist = document.getElementById(`votes-list-a-${scope.id}-${data.subRound}`);
                    if (alist) {
                        addVoteItem(alist, data.agentId, data.decision, data.reasoning);
                    }
                    break;

                case 'operationA:subround:result':
                    const resDiv = document.createElement('div');
                    resDiv.className = 'result-summary';
                    resDiv.innerHTML = `📊 Result: ${data.keepCount} keep / ${data.reviseCount} revise → ${data.majorityReached ? 'Consensus Reached' : 'No Consensus'}`;
                    scope.activeSubroundSection.appendChild(resDiv);
                    break;

                case 'operationB:start':
                    createOpCard(`Operation B — Review (Round ${data.round})`, 'review', scope);
                    const bVotesList = document.createElement('div');
                    bVotesList.className = 'votes-list';
                    bVotesList.id = `votes-list-b-${scope.id}-${data.round}`;
                    scope.activeOpCard.querySelector('.op-body').appendChild(bVotesList);
                    break;

                case 'operationB:vote':
                    const currentBList = scope.activeOpCard.querySelector('.votes-list');
                    if (currentBList) {
                        addVoteItem(currentBList, data.agentId, data.decision, data.reasoning);
                    }
                    break;

                case 'operationB:complete':
                    const bResultDiv = document.createElement('div');
                    bResultDiv.className = 'result-summary';
                    const color = data.decision === 'accept' ? 'var(--keep-color)' : 'var(--error-color)';
                    bResultDiv.innerHTML = `📊 Decision: <span style="color: ${color}; text-transform: uppercase;">${data.decision}</span>`;
                    scope.activeOpCard.querySelector('.op-body').appendChild(bResultDiv);
                    break;

                case 'operationK:start':
                    createOpCard(`Operation K — Synthesis`, 'synthesis', scope);
                    break;

                case 'operationK:complete':
                    const kStatus = scope.activeOpCard.querySelector('.op-status');
                    kStatus.innerHTML = `🟢 Complete (${data.responseLength} chars)`;
                    break;

                case 'result':
                    scope.finalResponseContainer.classList.add('visible');
                    scope.finalResponseText.innerText = data.response;
                    setTimeout(() => {
                        scope.finalResponseContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 100);
                    break;

                case 'orchestration:error':
                    if (scope.statusText) scope.statusText.innerHTML = `<span style="color: var(--error-color)">🔴 Error</span>`;
                    const errDiv = document.createElement('div');
                    errDiv.className = 'panel';
                    errDiv.style.borderColor = 'var(--error-color)';
                    errDiv.style.color = 'var(--error-color)';
                    errDiv.innerText = `Error: ${data.error}`;
                    scope.processView.appendChild(errDiv);
                    break;
            }

            // Auto-scroll
            if (scope.mainScroll) scope.mainScroll.scrollTop = scope.mainScroll.scrollHeight;
        }

        function createOpCard(title, type, scope) {
            const card = document.createElement('div');
            card.className = 'panel op-card';
            card.innerHTML = `
                <div class="op-header">
                    <div class="op-title">${title}</div>
                    <div class="op-status"><span class="pulse"></span> Running</div>
                </div>
                <div class="op-body"></div>
            `;
            
            const header = card.querySelector('.op-header');
            header.addEventListener('click', () => {
                card.classList.toggle('collapsed');
            });

            scope.processView.appendChild(card);
            scope.activeOpCard = card;
        }

        function createSubroundSection(title, id, scope) {
            const section = document.createElement('div');
            section.className = 'subround-section';
            section.id = `${scope.id}-${id}`;
            section.innerHTML = `<div class="subround-title">${title}</div>`;
            scope.activeOpCard.querySelector('.op-body').appendChild(section);
            scope.activeSubroundSection = section;
        }

        function createStreamingAgentCard(container, agentId, index, scope) {
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.id = `agent-card-${scope.id}-${agentId}`;
            card.innerHTML = `
                <div class="agent-card-header">
                    <span>🤖 Agent ${index + 1}</span>
                    <span class="agent-card-status" style="font-size: 0.75rem; color: var(--accent-color);"><span class="pulse"></span> Generating...</span>
                </div>
                <div class="agent-card-body">
                    <div class="stream-content" id="stream-${scope.id}-${agentId}" style="white-space: pre-wrap; min-height: 60px; font-size: 0.8125rem; max-height: 200px; overflow-y: auto;"></div>
                </div>
            `;
            container.appendChild(card);
        }

        function appendToAgentCard(agentId, token, scope) {
            const streamEl = document.getElementById(`stream-${scope.id}-${agentId}`);
            if (streamEl) {
                streamEl.textContent += token;
                // Auto-scroll within the card
                streamEl.scrollTop = streamEl.scrollHeight;
            }
        }

        function finalizeAgentCard(agentId, fullResponse, scope) {
            const card = document.getElementById(`agent-card-${scope.id}-${agentId}`);
            if (!card) return;
            
            // Update status
            const status = card.querySelector('.agent-card-status');
            if (status) {
                status.innerHTML = '<span style="color: var(--keep-color);">✅ Done</span>';
            }
            
            // Add 'done' class to stream content to hide cursor
            const streamEl = card.querySelector('.stream-content');
            if (streamEl) streamEl.classList.add('done');

            // Replace stream content with full response + expand/collapse
            const body = card.querySelector('.agent-card-body');
            const preview = fullResponse.substring(0, 300);
            const needsExpand = fullResponse.length > 300;
            
            body.innerHTML = `
                <div class="content-preview" style="white-space: pre-wrap; font-size: 0.8125rem;">${escapeHtml(preview)}${needsExpand ? '...' : ''}</div>
                ${needsExpand ? `
                    <div class="content-full hidden" style="white-space: pre-wrap; font-size: 0.8125rem;">${escapeHtml(fullResponse)}</div>
                    <button class="expand-btn" onclick="toggleExpand(this)">Show Full Response (${fullResponse.length} chars)</button>
                ` : ''}
            `;
        }

        function toggleExpand(btn) {
            const body = btn.parentElement;
            const preview = body.querySelector('.content-preview');
            const full = body.querySelector('.content-full');
            if (full.classList.contains('hidden')) {
                full.classList.remove('hidden');
                preview.classList.add('hidden');
                btn.textContent = 'Collapse';
            } else {
                full.classList.add('hidden');
                preview.classList.remove('hidden');
                btn.textContent = 'Show Full Response';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addVoteItem(container, agentId, decision, reasoning) {
            const item = document.createElement('div');
            item.className = `vote-item vote-${decision}`;
            
            let emoji = '✅';
            if (decision === 'revise' || decision === 'redo') emoji = '🔄';
            
            item.innerHTML = `
                <div>
                    <span class="vote-badge badge-${decision}">${emoji} ${decision}</span>
                    <strong>Agent ${agentId.slice(0, 8)}</strong>
                </div>
                <div class="vote-reason">${reasoning || 'No reasoning provided.'}</div>
            `;
            container.appendChild(item);
        }

        // --- Monitor Logic ---
        const monitorStates = new Map();

        function connectMonitor() {
            const endpoint = elements.endpointInput.value.trim();
            const es = new EventSource(`${endpoint}/v1/monitor`);
            
            es.onmessage = (e) => {
                try {
                    const event = JSON.parse(e.data);
                    handleMonitorEvent(event);
                } catch (err) {
                    console.error('Monitor parse error', err);
                }
            };
            
            es.onerror = () => {
                console.log('Monitor connection lost. Reconnecting...');
                es.close();
                setTimeout(connectMonitor, 3000);
            };
        }

        function handleMonitorEvent(event) {
            const { type, monitorId, timestamp, data } = event;
            
            if (type === 'request:start') {
                createMonitorCard(monitorId, timestamp, data);
                return;
            }
            
            const state = monitorStates.get(monitorId);
            if (!state) return;
            
            if (type === 'progress') {
                handleEvent(data, state);
            } else if (type === 'request:complete') {
                updateMonitorStatus(monitorId, 'complete', data);
            } else if (type === 'request:error') {
                updateMonitorStatus(monitorId, 'error', data);
            }
        }

        function createMonitorCard(id, timestamp, data) {
            const card = document.createElement('div');
            card.className = 'monitor-card';
            card.id = `monitor-${id}`;
            
            const timeStr = new Date(timestamp).toLocaleTimeString();
            
            card.innerHTML = `
                <div class="monitor-card-header">
                    <div class="monitor-info">
                        <div class="monitor-meta">
                            <span class="monitor-id">#${id}</span>
                            <span>${timeStr}</span>
                            <span>Model: ${data.model}</span>
                            <span>${data.stream ? '⚡ Stream' : '📦 Non-stream'}</span>
                        </div>
                    </div>
                    <div class="monitor-status-pill" id="status-pill-${id}">
                        <span class="pulse pulse-purple"></span> Running
                    </div>
                </div>
                <div class="monitor-sections">
                    <div class="monitor-section">
                        <div class="monitor-section-header" onclick="this.parentElement.classList.toggle('collapsed')">Request <span>▼</span></div>
                        <div class="monitor-section-body message-list">
                            ${data.messages.map(m => `
                                <div class="msg-bubble msg-${m.role}">${escapeHtml(m.content)}</div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="monitor-section">
                        <div class="monitor-section-header" onclick="this.parentElement.classList.toggle('collapsed')">Process <span>▼</span></div>
                        <div class="monitor-section-body" id="monitor-process-${id}"></div>
                    </div>
                    <div class="monitor-section">
                        <div class="monitor-section-header" onclick="this.parentElement.classList.toggle('collapsed')">Response <span>▼</span></div>
                        <div class="monitor-section-body" id="monitor-response-container-${id}" style="display:none">
                            <pre id="monitor-response-${id}" style="white-space: pre-wrap; font-size: 0.9rem;"></pre>
                            <div id="monitor-duration-${id}" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;"></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Prepend to list
            elements.monitorList.insertBefore(card, elements.monitorList.firstChild);
            
            // Initialize state
            const state = {
                id: id,
                processView: document.getElementById(`monitor-process-${id}`),
                finalResponseContainer: document.getElementById(`monitor-response-container-${id}`),
                finalResponseText: document.getElementById(`monitor-response-${id}`),
                mainScroll: null,
                activeOpCard: null,
                activeSubroundSection: null
            };
            monitorStates.set(id, state);
        }

        function updateMonitorStatus(id, status, data) {
            const pill = document.getElementById(`status-pill-${id}`);
            if (!pill) return;
            
            if (status === 'complete') {
                pill.innerHTML = `<span class="status-dot" style="background-color: var(--keep-color)"></span> Complete`;
                const container = document.getElementById(`monitor-response-container-${id}`);
                const text = document.getElementById(`monitor-response-${id}`);
                const duration = document.getElementById(`monitor-duration-${id}`);
                
                if (container) container.style.display = 'block';
                if (text) text.innerText = data.response;
                if (duration) duration.innerText = `Duration: ${(data.duration / 1000).toFixed(2)}s`;
            } else if (status === 'error') {
                pill.innerHTML = `<span class="status-dot" style="background-color: var(--error-color)"></span> Error`;
                const container = document.getElementById(`monitor-response-container-${id}`);
                const text = document.getElementById(`monitor-response-${id}`);
                
                if (container) {
                    container.style.display = 'block';
                    container.style.borderColor = 'var(--error-color)';
                }
                if (text) {
                    text.style.color = 'var(--error-color)';
                    text.innerText = `Error: ${data.error}`;
                }
            }
        }

        // Start monitor on load
        window.addEventListener('load', connectMonitor);
    </script>
</body>
</html>
